# Frontend nginx config used inside the Docker image.
# Serves the built SPA and reverse-proxies `/api` (REST) and `/ws` (WebSocket)
# to the backend service available on the compose network.

upstream backend_upstream {
  # The hostname here matches the service name in docker-compose.yml.
  server backend:5002;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Lightweight container health endpoint used by docker HEALTHCHECK
  location = /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # REST API
  location /api/ {
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # WebSocket price stream — needs explicit Upgrade headers
  location /ws {
    proxy_pass         http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Long cache for hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every unknown route serves index.html so React Router can
  # take over client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
